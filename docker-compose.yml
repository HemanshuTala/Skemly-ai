# Full stack for local testing. Browser → http://localhost:5173 , API → http://localhost:5000
# If port 27017 is already in use on your machine, stop the other MongoDB or set MONGODB_URI (e.g. mongodb://localhost:27018/skemly) and change the port mapping below.

services:
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - skemly_net

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    networks:
      - skemly_net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    working_dir: /usr/src/app
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/skemly
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-docker}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-docker}
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    command: sh -c "npm install && npm run dev --workspace=@skemly/backend"
    networks:
      - skemly_net

  frontend:
    image: node:20-alpine
    working_dir: /usr/src/app
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    volumes:
      - .:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    command: sh -c "npm install && npm run dev --workspace=@skemly/frontend -- --host 0.0.0.0 --port 5173"
    networks:
      - skemly_net

networks:
  skemly_net:
    driver: bridge

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:
